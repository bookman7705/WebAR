<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Web AR SLAM Pose Viewer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #e6e6e6;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    #camera {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      background: #000;
    }

    #processCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
    }

    #hud {
      position: absolute;
      left: 12px;
      top: 12px;
      right: 12px;
      max-width: 560px;
      z-index: 2;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(3px);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .label {
      color: #9eb9ff;
      font-size: 12px;
      min-width: 92px;
    }

    .value {
      font-size: 14px;
      color: #f4f7ff;
      word-break: break-word;
    }

    pre {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.3;
      color: #d6ffd9;
      white-space: pre;
      overflow-x: auto;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: rgba(0, 0, 0, 0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      text-align: center;
    }

    #overlay p {
      max-width: 560px;
      color: #c8c8c8;
      line-height: 1.4;
      font-size: 14px;
    }

    #startButton {
      border: 1px solid #fff;
      color: #fff;
      background: transparent;
      border-radius: 8px;
      padding: 12px 18px;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <video id="camera" autoplay muted playsinline webkit-playsinline></video>
    <canvas id="processCanvas"></canvas>

    <div id="hud">
      <div class="row">
        <span class="label">Status:</span>
        <span class="value" id="statusValue">Waiting to start</span>
      </div>
      <div class="row">
        <span class="label">Rotation:</span>
        <span class="value" id="rotationValue">--</span>
      </div>
      <div class="row">
        <span class="label">Translation:</span>
        <span class="value" id="translationValue">--</span>
      </div>
      <pre id="poseMatrixValue">Pose matrix unavailable</pre>
    </div>

    <div id="overlay">
      <button id="startButton" type="button">Start Camera SLAM</button>
      <p>
        Open this page over HTTPS or localhost, grant camera permission, and the
        estimated camera pose (rotation + translation) will be shown live.
      </p>
    </div>
  </div>

  <script>
    const app = document.getElementById("app");
    const videoEl = document.getElementById("camera");
    const canvasEl = document.getElementById("processCanvas");
    const overlayEl = document.getElementById("overlay");
    const startButtonEl = document.getElementById("startButton");

    const statusValueEl = document.getElementById("statusValue");
    const rotationValueEl = document.getElementById("rotationValue");
    const translationValueEl = document.getElementById("translationValue");
    const poseMatrixValueEl = document.getElementById("poseMatrixValue");
    let hasStarted = false;
    let modules = null;

    async function importFirstAvailable(paths, label) {
      const failures = [];

      for (const path of paths) {
        try {
          const mod = await import(path);
          return { mod, path };
        } catch (error) {
          const reason = (error && error.message) ? error.message : String(error);
          failures.push(`${path} -> ${reason}`);
        }
      }

      throw new Error(`${label} import failed.\n${failures.join("\n")}`);
    }

    async function ensureModulesLoaded() {
      if (modules) {
        return modules;
      }

      const alvaCandidates = [
        "./AlvaAR/examples/public/assets/alva_ar.js",
        "./AlvaAR/dist/alva_ar.js",
        "https://alanross.github.io/AlvaAR/examples/public/assets/alva_ar.js",
      ];

      const utilsCandidates = [
        "./AlvaAR/examples/public/assets/utils.js",
        "https://alanross.github.io/AlvaAR/examples/public/assets/utils.js",
      ];

      const [{ mod: alvaModule }, { mod: utilsModule }] = await Promise.all([
        importFirstAvailable(alvaCandidates, "AlvaAR module"),
        importFirstAvailable(utilsCandidates, "Utils module"),
      ]);

      modules = {
        AlvaAR: alvaModule.AlvaAR,
        Camera: utilsModule.Camera,
        onFrame: utilsModule.onFrame,
        resize2cover: utilsModule.resize2cover,
      };

      return modules;
    }

    const formatNumber = (value) => (Number.isFinite(value) ? value.toFixed(4) : "NaN");

    function matrixToText(pose) {
      return [
        `${formatNumber(pose[0])}  ${formatNumber(pose[1])}  ${formatNumber(pose[2])}  ${formatNumber(pose[3])}`,
        `${formatNumber(pose[4])}  ${formatNumber(pose[5])}  ${formatNumber(pose[6])}  ${formatNumber(pose[7])}`,
        `${formatNumber(pose[8])}  ${formatNumber(pose[9])}  ${formatNumber(pose[10])}  ${formatNumber(pose[11])}`,
        `${formatNumber(pose[12])}  ${formatNumber(pose[13])}  ${formatNumber(pose[14])}  ${formatNumber(pose[15])}`,
      ].join("\n");
    }

    function rotationFromPose(pose) {
      return [
        [pose[0], pose[1], pose[2]],
        [pose[4], pose[5], pose[6]],
        [pose[8], pose[9], pose[10]],
      ];
    }

    function translationFromPose(pose) {
      return [pose[12], pose[13], pose[14]];
    }

    function updateHUDWithPose(pose) {
      const rotation = rotationFromPose(pose);
      const translation = translationFromPose(pose);

      statusValueEl.textContent = "Tracking";
      rotationValueEl.textContent = rotation
        .map((row) => `[${row.map(formatNumber).join(", ")}]`)
        .join(" ");
      translationValueEl.textContent = `[${translation.map(formatNumber).join(", ")}]`;
      poseMatrixValueEl.textContent = matrixToText(pose);
    }

    function updateHUDAwaitingTracking(pointsCount) {
      statusValueEl.textContent = `Initializing / lost tracking (features: ${pointsCount})`;
      rotationValueEl.textContent = "--";
      translationValueEl.textContent = "--";
      poseMatrixValueEl.textContent = "Pose matrix unavailable";
    }

    async function startSLAM() {
      if (hasStarted) {
        return;
      }

      hasStarted = true;
      startButtonEl.disabled = true;
      startButtonEl.textContent = "Starting...";
      statusValueEl.textContent = "Loading scripts...";

      const constraints = {
        video: {
          facingMode: "environment",
          aspectRatio: 16 / 9,
          width: { ideal: 1280 },
        },
        audio: false,
      };

      try {
        const { AlvaAR, Camera, onFrame, resize2cover } = await ensureModulesLoaded();
        const media = await Camera.Initialize(constraints.video);
        const video = media.el;
        videoEl.srcObject = video.srcObject;
        await videoEl.play();

        const cover = resize2cover(
          video.videoWidth,
          video.videoHeight,
          app.clientWidth,
          app.clientHeight
        );
        videoEl.style.width = `${cover.width}px`;
        videoEl.style.height = `${cover.height}px`;
        videoEl.style.left = `${cover.x}px`;
        videoEl.style.top = `${cover.y}px`;

        canvasEl.width = app.clientWidth;
        canvasEl.height = app.clientHeight;
        const ctx = canvasEl.getContext("2d", { alpha: false, desynchronized: true });

        statusValueEl.textContent = "Loading SLAM engine...";
        const alva = await AlvaAR.Initialize(canvasEl.width, canvasEl.height);

        overlayEl.remove();
        statusValueEl.textContent = "Running";

        onFrame(() => {
          if (document.hidden) {
            return true;
          }

          ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);
          ctx.drawImage(
            videoEl,
            0,
            0,
            video.videoWidth,
            video.videoHeight,
            cover.x,
            cover.y,
            cover.width,
            cover.height
          );

          const frame = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
          const pose = alva.findCameraPose(frame);

          if (pose) {
            updateHUDWithPose(pose);
          } else {
            const points = alva.getFramePoints();
            updateHUDAwaitingTracking(points.length);
          }

          return true;
        }, 30);
      } catch (error) {
        hasStarted = false;
        const message = (error && error.message) ? error.message : String(error);
        statusValueEl.textContent = `Failed to start: ${message}`;
        startButtonEl.disabled = false;
        startButtonEl.textContent = "Start Camera Pose";
        alert(
          `Could not start AR SLAM camera.\n\n${message}\n\nTip: serve this page from http://localhost or https:// (not file://).`
        );
      }
    }

    startButtonEl.textContent = "Start Camera Pose";
    startButtonEl.addEventListener("click", startSLAM);
  </script>
</body>
</html>
