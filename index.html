<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>XR8 Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 8th Wall Engine -->
    <script async src="./xr.js" data-preload-chunks="slam"></script>

    <!-- 8th Wall A-Frame (8-Frame) -->
    <script src="./aframe.min.js"></script>
  </head>

  <body>
    <!-- A-Frame Scene with XR8 enabled -->
    <a-scene
      xrconfig
      xrweb
      renderer="colorManagement: true"
      embedded
    >
      <!-- Camera -->
      <a-camera position="0 1.6 0"></a-camera>

      <!-- Simple object to verify rendering -->
      <a-box
        position="0 1 -3"
        rotation="0 45 0"
        color="#4CC3D9"
      ></a-box>

      <!-- Light -->
      <a-light type="directional" position="1 1 1"></a-light>
      <a-light type="ambient" intensity="0.5"></a-light>
    </a-scene>
  </body>
</html>
