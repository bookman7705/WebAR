<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Web AR SLAM Starter</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
    }

    #startButton {
      padding: 12px 18px;
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    #statusText {
      position: fixed;
      left: 10px;
      bottom: 10px;
      color: #e5e5e5;
      font-family: sans-serif;
      font-size: 12px;
      z-index: 11;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px 8px;
      border-radius: 6px;
    }

    #voDebug {
      position: fixed;
      left: 10px;
      top: 10px;
      color: #d7ffd7;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.35;
      z-index: 11;
      background: rgba(0, 0, 0, 0.45);
      padding: 8px 10px;
      border-radius: 6px;
      white-space: pre;
      pointer-events: none;
    }
  </style>

  <script src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>

<body>

<div id="startOverlay">
  <button id="startButton" type="button">Start AR Camera</button>
</div>
<div id="statusText">Tap "Start AR Camera" to begin.</div>
<div id="voDebug">Keypoints: 0
Matches: 0
Inliers: 0
AvgDist: 0.00
t: [0.00, 0.00, 0.00]
R:
1.00 0.00 0.00
0.00 1.00 0.00
0.00 0.00 1.00
Motion: 0.00</div>

<video id="video" autoplay muted playsinline webkit-playsinline></video>
<canvas id="canvas"></canvas>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let startOverlay = document.getElementById("startOverlay");
let startButton = document.getElementById("startButton");
let statusText = document.getElementById("statusText");
let voDebug = document.getElementById("voDebug");

let streaming = false;
let src = null;
let gray = null;
let orb = null;
let bf = null;

const MAX_ORB_FEATURES = 450;
const MAX_MATCHES = 150;
const MIN_POSE_POINTS = 8;
const MIN_POSE_INLIERS = 25;
const ESSENTIAL_RANSAC_THRESH = 1.0;
const ARROW_SCALE = 180;
const STALL_DELTA_EPS = 0.015;
const STALL_FRAME_LIMIT = 10;

let prevKeypoints = null;
let prevDescriptors = null;

let globalR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
let globalT = [0, 0, 0];
let latestRelativeT = [0, 0, 0];
let latestRelativeR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
let trajectory = [[0, 0, 0]];

let keypointCount = 0;
let matchCount = 0;
let essentialInlierCount = 0;
let avgMatchDistance = 0;
let motionActivity = "INIT";
let lastRelativeT = [0, 0, 0];
let staticMotionFrames = 0;
let lastDeltaMotion = 0;
let lastENorm = 0;
let lastRDet = 1;

let matchDrawPairs = [];
let reseedRequested = false;

async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error("Camera API is not available in this browser.");
  }

  const constraintsToTry = [
    { video: { facingMode: { exact: "environment" } }, audio: false },
    { video: { facingMode: "environment" }, audio: false },
    { video: true, audio: false }
  ];

  let stream = null;
  let lastError = null;
  for (let i = 0; i < constraintsToTry.length; i++) {
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraintsToTry[i]);
      break;
    } catch (err) {
      lastError = err;
    }
  }

  if (!stream) {
    throw lastError || new Error("Unable to access camera.");
  }

  video.srcObject = stream;
  video.setAttribute("playsinline", "true");
  video.setAttribute("webkit-playsinline", "true");
  video.muted = true;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play().catch(() => {});
      resolve();
    };
  });
}

function waitForCV() {
  return new Promise(resolve => {
    const check = () => {
      if (typeof cv !== "undefined" && cv.Mat) {
        resolve();
      } else {
        setTimeout(check, 50);
      }
    };
    check();
  });
}

function updateCanvasSize() {
  const w = video.videoWidth || window.innerWidth;
  const h = video.videoHeight || window.innerHeight;
  canvas.width = w;
  canvas.height = h;
}

function resetFrameState() {
  keypointCount = 0;
  matchCount = 0;
  essentialInlierCount = 0;
  avgMatchDistance = 0;
  lastENorm = 0;
  lastRDet = 1;
  lastDeltaMotion = 0;
  latestRelativeT = [0, 0, 0];
  latestRelativeR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
  motionActivity = "RESET";
  matchDrawPairs = [];
}

function resetMatcherState(reason = "reset") {
  if (prevDescriptors) {
    prevDescriptors.delete();
    prevDescriptors = null;
  }
  prevKeypoints = null;
  reseedRequested = false;
  staticMotionFrames = 0;
  lastRelativeT = [0, 0, 0];
  resetFrameState();
  statusText.textContent = `ORB matching (${reason})...`;
}

function ensureFrameBufferSize() {
  if (!src || src.rows !== canvas.height || src.cols !== canvas.width) {
    if (src) src.delete();
    src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
    resetMatcherState("resize");
  }
}

function requestFeatureReseed(reason) {
  if (!reseedRequested) {
    if (reason === "pose_stall") {
      console.warn("POSE STALL DETECTED");
    } else {
      console.warn(`FEATURE RESEED (${reason})`);
    }
  }
  reseedRequested = true;
}

function matData(mat) {
  return mat.data64F || mat.data32F || mat.data || mat.data8U || [];
}

function pointsToMat(points) {
  const flat = [];
  for (let i = 0; i < points.length; i++) {
    flat.push(points[i].x, points[i].y);
  }
  return cv.matFromArray(points.length, 1, cv.CV_32FC2, flat);
}

function multiplyMat3(a, b) {
  return [
    (a[0] * b[0]) + (a[1] * b[3]) + (a[2] * b[6]),
    (a[0] * b[1]) + (a[1] * b[4]) + (a[2] * b[7]),
    (a[0] * b[2]) + (a[1] * b[5]) + (a[2] * b[8]),
    (a[3] * b[0]) + (a[4] * b[3]) + (a[5] * b[6]),
    (a[3] * b[1]) + (a[4] * b[4]) + (a[5] * b[7]),
    (a[3] * b[2]) + (a[4] * b[5]) + (a[5] * b[8]),
    (a[6] * b[0]) + (a[7] * b[3]) + (a[8] * b[6]),
    (a[6] * b[1]) + (a[7] * b[4]) + (a[8] * b[7]),
    (a[6] * b[2]) + (a[7] * b[5]) + (a[8] * b[8])
  ];
}

function multiplyMatVec3(m, v) {
  return [
    (m[0] * v[0]) + (m[1] * v[1]) + (m[2] * v[2]),
    (m[3] * v[0]) + (m[4] * v[1]) + (m[5] * v[2]),
    (m[6] * v[0]) + (m[7] * v[1]) + (m[8] * v[2])
  ];
}

function readMat3x3(mat) {
  const srcData = mat.data64F || mat.data32F;
  if (!srcData || srcData.length < 9) return null;
  const out = new Array(9);
  for (let i = 0; i < 9; i++) out[i] = srcData[i];
  return out;
}

function readMat3x1(mat) {
  const srcData = mat.data64F || mat.data32F;
  if (!srcData || srcData.length < 3) return null;
  return [srcData[0], srcData[1], srcData[2]];
}

function isFiniteVec(arr) {
  if (!arr || !arr.length) return false;
  for (let i = 0; i < arr.length; i++) {
    if (!Number.isFinite(arr[i])) return false;
  }
  return true;
}

function frobeniusNorm(data) {
  let sumSq = 0;
  for (let i = 0; i < data.length; i++) {
    if (!Number.isFinite(data[i])) return NaN;
    sumSq += data[i] * data[i];
  }
  return Math.sqrt(sumSq);
}

function det3(m) {
  return (m[0] * ((m[4] * m[8]) - (m[5] * m[7])))
    - (m[1] * ((m[3] * m[8]) - (m[5] * m[6])))
    + (m[2] * ((m[3] * m[7]) - (m[4] * m[6])));
}

function drawArrow(x0, y0, x1, y1, color) {
  const angle = Math.atan2(y1 - y0, x1 - x0);
  const head = 10;
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 - (head * Math.cos(angle - Math.PI / 6)), y1 - (head * Math.sin(angle - Math.PI / 6)));
  ctx.lineTo(x1 - (head * Math.cos(angle + Math.PI / 6)), y1 - (head * Math.sin(angle + Math.PI / 6)));
  ctx.closePath();
  ctx.fill();
}

function updateDebugOverlay() {
  const tx = latestRelativeT[0];
  const ty = latestRelativeT[1];
  const tz = latestRelativeT[2];
  const motionMag = Math.hypot(tx, ty, tz);

  voDebug.textContent =
`Keypoints: ${keypointCount}
Matches: ${matchCount}
Inliers: ${essentialInlierCount}
AvgDist: ${avgMatchDistance.toFixed(2)}
E-norm: ${Number.isFinite(lastENorm) ? lastENorm.toFixed(4) : "nan"}
det(R): ${Number.isFinite(lastRDet) ? lastRDet.toFixed(4) : "nan"}
t: [${tx.toFixed(2)}, ${ty.toFixed(2)}, ${tz.toFixed(2)}]
globalT: [${globalT[0].toFixed(2)}, ${globalT[1].toFixed(2)}, ${globalT[2].toFixed(2)}]
Delta t: ${lastDeltaMotion.toFixed(4)}
Motion: ${motionActivity}
R:
${latestRelativeR[0].toFixed(2)} ${latestRelativeR[1].toFixed(2)} ${latestRelativeR[2].toFixed(2)}
${latestRelativeR[3].toFixed(2)} ${latestRelativeR[4].toFixed(2)} ${latestRelativeR[5].toFixed(2)}
${latestRelativeR[6].toFixed(2)} ${latestRelativeR[7].toFixed(2)} ${latestRelativeR[8].toFixed(2)}
|t|: ${motionMag.toFixed(2)}`;
}

function estimatePoseFromMatches(prevPts, currPts) {
  essentialInlierCount = 0;
  lastENorm = 0;
  lastRDet = 1;

  if (prevPts.length < MIN_POSE_POINTS || currPts.length !== prevPts.length) {
    motionActivity = "INSUFFICIENT_MATCHES";
    latestRelativeT = [0, 0, 0];
    latestRelativeR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
    return new Array(currPts.length).fill(false);
  }

  const prevPtsMat = pointsToMat(prevPts);
  const currPtsMat = pointsToMat(currPts);
  const inlierMask = new cv.Mat();
  const poseMask = new cv.Mat();
  let inlierPrevMat = null;
  let inlierCurrMat = null;
  let essential = null;
  let R = null;
  let t = null;
  const drawInliers = new Array(currPts.length).fill(false);

  try {
    const focalLength = Math.max(canvas.width, 1);
    const principalPoint = new cv.Point(canvas.width * 0.5, canvas.height * 0.5);

    essential = cv.findEssentialMat(
      currPtsMat,
      prevPtsMat,
      focalLength,
      principalPoint,
      cv.RANSAC,
      0.999,
      ESSENTIAL_RANSAC_THRESH,
      inlierMask
    );

    if (!essential || essential.empty() || essential.rows < 3 || essential.cols < 3) {
      motionActivity = "SKIP_NO_E";
      latestRelativeT = [0, 0, 0];
      return drawInliers;
    }

    const eFirst = essential.data64F ? essential.data64F[0] : (essential.data32F ? essential.data32F[0] : NaN);
    if (!Number.isFinite(eFirst)) {
      motionActivity = "SKIP_BAD_E";
      latestRelativeT = [0, 0, 0];
      return drawInliers;
    }
    lastENorm = frobeniusNorm(matData(essential));

    const rawMask = matData(inlierMask);
    const firstInlierPrev = [];
    const firstInlierCurr = [];
    const firstInlierIndices = [];
    for (let i = 0; i < currPts.length; i++) {
      const maskValue = i < rawMask.length ? rawMask[i] : 0;
      const isInlier = (maskValue === 1 || maskValue === 255);
      if (isInlier) {
        firstInlierPrev.push(prevPts[i]);
        firstInlierCurr.push(currPts[i]);
        firstInlierIndices.push(i);
      }
    }

    if (firstInlierCurr.length < MIN_POSE_INLIERS) {
      motionActivity = "SKIP_LOW_INLIERS";
      latestRelativeT = [0, 0, 0];
      return drawInliers;
    }

    inlierPrevMat = pointsToMat(firstInlierPrev);
    inlierCurrMat = pointsToMat(firstInlierCurr);
    R = new cv.Mat();
    t = new cv.Mat();

    cv.recoverPose(
      essential,
      inlierCurrMat,
      inlierPrevMat,
      R,
      t,
      focalLength,
      principalPoint,
      poseMask
    );

    const recoveredMask = matData(poseMask);
    for (let i = 0; i < firstInlierCurr.length; i++) {
      const maskValue = i < recoveredMask.length ? recoveredMask[i] : 0;
      const isInlier = (maskValue === 1 || maskValue === 255);
      if (isInlier) {
        drawInliers[firstInlierIndices[i]] = true;
        essentialInlierCount++;
      }
    }

    if (essentialInlierCount < MIN_POSE_INLIERS) {
      motionActivity = "SKIP_POSE_INLIERS";
      latestRelativeT = [0, 0, 0];
      return drawInliers;
    }

    const relativeR = readMat3x3(R);
    const relativeT = readMat3x1(t);
    if (!relativeR || !relativeT || !isFiniteVec(relativeR) || !isFiniteVec(relativeT)) {
      motionActivity = "SKIP_BAD_RT";
      latestRelativeT = [0, 0, 0];
      return drawInliers;
    }

    latestRelativeR = relativeR;
    latestRelativeT = relativeT;
    lastRDet = det3(relativeR);

    const deltaMotion = Math.hypot(
      relativeT[0] - lastRelativeT[0],
      relativeT[1] - lastRelativeT[1],
      relativeT[2] - lastRelativeT[2]
    );
    lastDeltaMotion = deltaMotion;
    if (deltaMotion < STALL_DELTA_EPS) {
      staticMotionFrames++;
      motionActivity = "LOW_MOTION";
      if (staticMotionFrames >= STALL_FRAME_LIMIT) {
        motionActivity = "POSE_STALL";
        requestFeatureReseed("pose_stall");
      }
    } else {
      staticMotionFrames = 0;
      motionActivity = "ACTIVE";
    }

    const worldStep = multiplyMatVec3(globalR, relativeT);
    if (!isFiniteVec(worldStep)) {
      motionActivity = "SKIP_BAD_STEP";
      latestRelativeT = [0, 0, 0];
      return drawInliers;
    }
    globalT[0] += worldStep[0];
    globalT[1] += worldStep[1];
    globalT[2] += worldStep[2];
    globalR = multiplyMat3(relativeR, globalR);
    lastRelativeT = [relativeT[0], relativeT[1], relativeT[2]];

    if (trajectory.length === 0) {
      trajectory.push([globalT[0], globalT[1], globalT[2]]);
    } else {
      const last = trajectory[trajectory.length - 1];
      const step = Math.hypot(globalT[0] - last[0], globalT[1] - last[1], globalT[2] - last[2]);
      if (step > 1e-4) {
        trajectory.push([globalT[0], globalT[1], globalT[2]]);
      }
    }
    if (trajectory.length > 1200) {
      trajectory.shift();
    }

    return drawInliers;
  } catch (err) {
    motionActivity = "ERROR";
    latestRelativeT = [0, 0, 0];
    return drawInliers;
  } finally {
    prevPtsMat.delete();
    currPtsMat.delete();
    inlierMask.delete();
    poseMask.delete();
    if (essential) essential.delete();
    if (inlierPrevMat) inlierPrevMat.delete();
    if (inlierCurrMat) inlierCurrMat.delete();
    if (R) R.delete();
    if (t) t.delete();
  }
}

function drawTrajectoryTopDown() {
  if (trajectory.length < 2) return;

  const pad = 10;
  const panelSize = 140;
  const panelX = canvas.width - panelSize - pad;
  const panelY = pad;
  const innerPad = 10;
  const minDraw = panelX + innerPad;
  const maxDraw = panelX + panelSize - innerPad;

  let minX = trajectory[0][0];
  let maxX = trajectory[0][0];
  let minZ = trajectory[0][2];
  let maxZ = trajectory[0][2];
  for (let i = 1; i < trajectory.length; i++) {
    const p = trajectory[i];
    if (p[0] < minX) minX = p[0];
    if (p[0] > maxX) maxX = p[0];
    if (p[2] < minZ) minZ = p[2];
    if (p[2] > maxZ) maxZ = p[2];
  }

  const spanX = Math.max(maxX - minX, 1e-3);
  const spanZ = Math.max(maxZ - minZ, 1e-3);
  const scale = Math.min((maxDraw - minDraw) / spanX, (maxDraw - minDraw) / spanZ);

  ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
  ctx.fillRect(panelX, panelY, panelSize, panelSize);
  ctx.strokeStyle = "rgba(130, 130, 130, 0.75)";
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX, panelY, panelSize, panelSize);

  ctx.strokeStyle = "#ffd166";
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < trajectory.length; i++) {
    const p = trajectory[i];
    const x = minDraw + ((p[0] - minX) * scale);
    const y = maxDraw - ((p[2] - minZ) * scale);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  const last = trajectory[trajectory.length - 1];
  const cx = minDraw + ((last[0] - minX) * scale);
  const cy = maxDraw - ((last[2] - minZ) * scale);
  ctx.fillStyle = "#36c4ff";
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, 2 * Math.PI);
  ctx.fill();
}

function drawPoseDebugVisuals() {
  for (let i = 0; i < matchDrawPairs.length; i++) {
    const pair = matchDrawPairs[i];
    ctx.strokeStyle = pair.isInlier ? "rgba(0, 255, 102, 0.35)" : "rgba(255, 59, 48, 0.28)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pair.prev.x, pair.prev.y);
    ctx.lineTo(pair.curr.x, pair.curr.y);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(pair.curr.x, pair.curr.y, 2, 0, 2 * Math.PI);
    ctx.fillStyle = pair.isInlier ? "#00ff66" : "#ff3b30";
    ctx.fill();
  }

  const centerX = canvas.width * 0.5;
  const centerY = canvas.height * 0.5;
  const dirX = latestRelativeT[0];
  const dirY = latestRelativeT[1];
  const norm = Math.hypot(dirX, dirY);
  if (norm > 1e-5) {
    const maxLen = Math.min(canvas.width, canvas.height) * 0.22;
    const arrowLen = Math.min(maxLen, ARROW_SCALE * norm);
    const endX = centerX + ((dirX / norm) * arrowLen);
    const endY = centerY + ((dirY / norm) * arrowLen);
    drawArrow(centerX, centerY, endX, endY, "#36c4ff");
  }

  drawTrajectoryTopDown();
}

function processFrame() {
  if (!streaming) return;

  ensureFrameBufferSize();
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  src.data.set(imageData.data);
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

  const keypoints = new cv.KeyPointVector();
  const descriptors = new cv.Mat();

  try {
    orb.detect(gray, keypoints);
    orb.compute(gray, keypoints, descriptors);

    const currPoints = [];
    const kpSize = keypoints.size();
    for (let i = 0; i < kpSize; i++) {
      const kp = keypoints.get(i);
      currPoints.push({ x: kp.pt.x, y: kp.pt.y });
    }
    keypointCount = currPoints.length;
    matchDrawPairs = [];
    essentialInlierCount = 0;
    matchCount = 0;
    avgMatchDistance = 0;

    if (
      reseedRequested ||
      !prevDescriptors ||
      !prevKeypoints ||
      !prevDescriptors.data ||
      prevDescriptors.rows === 0 ||
      descriptors.rows === 0
    ) {
      resetMatcherState(reseedRequested ? "reseed" : "bootstrap");
      if (prevDescriptors) prevDescriptors.delete();
      prevDescriptors = descriptors.clone();
      prevKeypoints = currPoints;
      motionActivity = "BOOTSTRAP";
    } else {
      const matches = new cv.DMatchVector();
      try {
        bf.match(prevDescriptors, descriptors, matches);

        const sorted = [];
        for (let i = 0; i < matches.size(); i++) {
          const m = matches.get(i);
          if (
            m.queryIdx >= 0 &&
            m.queryIdx < prevKeypoints.length &&
            m.trainIdx >= 0 &&
            m.trainIdx < currPoints.length
          ) {
            sorted.push({
              queryIdx: m.queryIdx,
              trainIdx: m.trainIdx,
              distance: m.distance
            });
          }
        }
        sorted.sort((a, b) => a.distance - b.distance);

        const topMatches = sorted.slice(0, MAX_MATCHES);
        let filteredMatches = topMatches;
        if (topMatches.length > 0) {
          const minDist = topMatches[0].distance;
          const distThresh = Math.max(minDist * 2.5, 30);
          const strong = topMatches.filter((m) => m.distance <= distThresh);
          if (strong.length >= MIN_POSE_POINTS) {
            filteredMatches = strong;
          }
        }

        matchCount = filteredMatches.length;
        if (matchCount > 0) {
          let distSum = 0;
          for (let i = 0; i < filteredMatches.length; i++) {
            distSum += filteredMatches[i].distance;
          }
          avgMatchDistance = distSum / matchCount;
        }

        const prevPts = [];
        const currPts = [];
        for (let i = 0; i < filteredMatches.length; i++) {
          const m = filteredMatches[i];
          prevPts.push(prevKeypoints[m.queryIdx]);
          currPts.push(currPoints[m.trainIdx]);
        }

        const inlierFlags = estimatePoseFromMatches(prevPts, currPts);
        for (let i = 0; i < filteredMatches.length; i++) {
          matchDrawPairs.push({
            prev: prevPts[i],
            curr: currPts[i],
            isInlier: !!inlierFlags[i]
          });
        }
      } finally {
        matches.delete();
      }

      if (reseedRequested) {
        resetMatcherState("pose_stall");
      }

      if (prevDescriptors) prevDescriptors.delete();
      prevDescriptors = descriptors.clone();
      prevKeypoints = currPoints;
    }
  } catch (err) {
    motionActivity = "ERROR";
    requestFeatureReseed("frame_error");
    resetMatcherState("frame_error");
  } finally {
    keypoints.delete();
    descriptors.delete();
  }

  drawPoseDebugVisuals();
  updateDebugOverlay();

  requestAnimationFrame(processFrame);
}

async function init() {
  statusText.textContent = "Starting camera...";
  await startCamera();
  statusText.textContent = "Loading OpenCV...";
  await waitForCV();

  updateCanvasSize();
  src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
  gray = new cv.Mat();

  orb = new cv.ORB(MAX_ORB_FEATURES);
  if (orb.setMaxFeatures) {
    orb.setMaxFeatures(MAX_ORB_FEATURES);
  }
  bf = new cv.BFMatcher(cv.NORM_HAMMING, false);

  resetMatcherState("init");
  streaming = true;
  statusText.textContent = "ORB VO running...";
  requestAnimationFrame(processFrame);
}

window.addEventListener("resize", () => {
  updateCanvasSize();
  requestFeatureReseed("resize");
});
window.addEventListener("orientationchange", () => {
  setTimeout(() => {
    updateCanvasSize();
    requestFeatureReseed("orientation");
  }, 120);
});

startButton.addEventListener("click", async () => {
  startButton.disabled = true;
  startButton.textContent = "Starting...";
  try {
    await init();
    startOverlay.style.display = "none";
  } catch (err) {
    const message = err && err.message ? err.message : "Failed to start AR camera.";
    statusText.textContent = message;
    startButton.disabled = false;
    startButton.textContent = "Retry Start";
  }
});
</script>

</body>
</html>
