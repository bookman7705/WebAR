<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Web AR SLAM Starter</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
    }

    #startButton {
      padding: 12px 18px;
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      background: #111;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    #statusText {
      position: fixed;
      left: 10px;
      bottom: 10px;
      color: #e5e5e5;
      font-family: sans-serif;
      font-size: 12px;
      z-index: 11;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px 8px;
      border-radius: 6px;
    }

    #voDebug {
      position: fixed;
      left: 10px;
      top: 10px;
      color: #d7ffd7;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.35;
      z-index: 11;
      background: rgba(0, 0, 0, 0.45);
      padding: 8px 10px;
      border-radius: 6px;
      white-space: pre;
      pointer-events: none;
    }
  </style>

  <script src="https://docs.opencv.org/4.x/opencv.js"></script>
</head>

<body>

<div id="startOverlay">
  <button id="startButton" type="button">Start AR Camera</button>
</div>
<div id="statusText">Tap "Start AR Camera" to begin.</div>
<div id="voDebug">Tracked Points: 0
Inliers: 0
t: [0.00, 0.00, 0.00]
R:
1.00 0.00 0.00
0.00 1.00 0.00
0.00 0.00 1.00
Motion: 0.00</div>

<video id="video" autoplay muted playsinline webkit-playsinline></video>
<canvas id="canvas"></canvas>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let startOverlay = document.getElementById("startOverlay");
let startButton = document.getElementById("startButton");
let statusText = document.getElementById("statusText");
let voDebug = document.getElementById("voDebug");

let streaming = false;

let src, gray;
let prevGray = null;
let trackedPoints = [];
let smoothedDrawPoints = [];

const MAX_POINTS = 180;
const MIN_POINTS = 60;
let lkWinSize = null;
let lkCriteria = null;
const DRAW_SMOOTH_ALPHA = 0.5;
const PIXEL_DEADZONE = 0.0;
const LK_ERR_MAX = 18;
const FB_ERR_MAX = 1.8;
const FLOW_OUTLIER_BASE = 2.8;
const FLOW_OUTLIER_SCALE = 2.4;
const REFILL_BLOCK_RADIUS = 10;
const MIN_POSE_POINTS = 8;
const MIN_POSE_INLIERS = 25;
const ESSENTIAL_RANSAC_THRESH = 1.0;
const ARROW_SCALE = 180;
const STALL_DELTA_EPS = 0.015;
const STALL_FRAME_LIMIT = 10;

let globalR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
let globalT = [0, 0, 0];
let latestRelativeT = [0, 0, 0];
let latestRelativeR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
let essentialInlierCount = 0;
let inlierDrawPoints = [];
let inlierDrawMask = [];
let trajectory = [[0, 0, 0]];
let lastRelativeT = [0, 0, 0];
let staticMotionFrames = 0;
let motionActivity = "INIT";
let lastENorm = 0;
let lastRDet = 1;
let lastDeltaMotion = 0;
let reseedRequested = false;

/* ---------------- CAMERA ---------------- */
async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error("Camera API is not available in this browser.");
  }

  const constraintsToTry = [
    { video: { facingMode: { exact: "environment" } }, audio: false },
    { video: { facingMode: "environment" }, audio: false },
    { video: true, audio: false }
  ];

  let stream = null;
  let lastError = null;
  for (let i = 0; i < constraintsToTry.length; i++) {
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraintsToTry[i]);
      break;
    } catch (err) {
      lastError = err;
    }
  }

  if (!stream) {
    throw lastError || new Error("Unable to access camera.");
  }

  video.srcObject = stream;
  video.setAttribute("playsinline", "true");
  video.setAttribute("webkit-playsinline", "true");
  video.muted = true;

  return new Promise(resolve => {
    video.onloadedmetadata = () => {
      video.play().catch(() => {});
      resolve();
    };
  });
}

/* ---------------- WAIT FOR OPENCV ---------------- */
function waitForCV() {
  return new Promise(resolve => {
    const check = () => {
      if (typeof cv !== "undefined" && cv.Mat) {
        resolve();
      } else {
        setTimeout(check, 50);
      }
    };
    check();
  });
}

function detectFeatures(grayMat, maxCorners = MAX_POINTS, blockedPoints = [], blockRadius = REFILL_BLOCK_RADIUS) {
  const corners = new cv.Mat();
  const mask = new cv.Mat(grayMat.rows, grayMat.cols, cv.CV_8UC1, new cv.Scalar(255));

  for (let i = 0; i < blockedPoints.length; i++) {
    const p = blockedPoints[i];
    if (
      !Number.isFinite(p.x) ||
      !Number.isFinite(p.y) ||
      p.x < 0 ||
      p.y < 0 ||
      p.x >= grayMat.cols ||
      p.y >= grayMat.rows
    ) {
      continue;
    }
    cv.circle(
      mask,
      new cv.Point(Math.round(p.x), Math.round(p.y)),
      blockRadius,
      new cv.Scalar(0),
      -1
    );
  }

  cv.goodFeaturesToTrack(
    grayMat,
    corners,
    maxCorners,
    0.01,
    8,
    mask
  );

  const points = [];
  const data = corners.data32F || [];
  for (let i = 0; i + 1 < data.length; i += 2) {
    points.push({ x: data[i], y: data[i + 1] });
  }

  corners.delete();
  mask.delete();
  return points;
}

function pointsToMat(points) {
  const flat = [];
  for (let i = 0; i < points.length; i++) {
    flat.push(points[i].x, points[i].y);
  }
  return cv.matFromArray(points.length, 1, cv.CV_32FC2, flat);
}

function smoothPoint(current, previous) {
  if (!previous) {
    return { x: current.x, y: current.y };
  }

  const dx = current.x - previous.x;
  const dy = current.y - previous.y;
  const dist = Math.hypot(dx, dy);

  if (dist < PIXEL_DEADZONE) {
    return { x: previous.x, y: previous.y };
  }

  return {
    x: (DRAW_SMOOTH_ALPHA * current.x) + ((1 - DRAW_SMOOTH_ALPHA) * previous.x),
    y: (DRAW_SMOOTH_ALPHA * current.y) + ((1 - DRAW_SMOOTH_ALPHA) * previous.y)
  };
}

function median(values) {
  if (!values.length) return 0;
  const sorted = values.slice().sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 === 0
    ? (sorted[mid - 1] + sorted[mid]) * 0.5
    : sorted[mid];
}

function updateCanvasSize() {
  const w = video.videoWidth || window.innerWidth;
  const h = video.videoHeight || window.innerHeight;
  canvas.width = w;
  canvas.height = h;
}

function resetTrackingState() {
  trackedPoints = [];
  smoothedDrawPoints = [];
  essentialInlierCount = 0;
  inlierDrawPoints = [];
  inlierDrawMask = [];
  latestRelativeT = [0, 0, 0];
  latestRelativeR = [1, 0, 0, 0, 1, 0, 0, 0, 1];
}

function ensureFrameBufferSize() {
  if (!src || src.rows !== canvas.height || src.cols !== canvas.width) {
    if (src) src.delete();
    src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
    if (prevGray) {
      prevGray.delete();
      prevGray = null;
    }
    resetTrackingState();
  }
}

function multiplyMat3(a, b) {
  return [
    (a[0] * b[0]) + (a[1] * b[3]) + (a[2] * b[6]),
    (a[0] * b[1]) + (a[1] * b[4]) + (a[2] * b[7]),
    (a[0] * b[2]) + (a[1] * b[5]) + (a[2] * b[8]),
    (a[3] * b[0]) + (a[4] * b[3]) + (a[5] * b[6]),
    (a[3] * b[1]) + (a[4] * b[4]) + (a[5] * b[7]),
    (a[3] * b[2]) + (a[4] * b[5]) + (a[5] * b[8]),
    (a[6] * b[0]) + (a[7] * b[3]) + (a[8] * b[6]),
    (a[6] * b[1]) + (a[7] * b[4]) + (a[8] * b[7]),
    (a[6] * b[2]) + (a[7] * b[5]) + (a[8] * b[8])
  ];
}

function multiplyMatVec3(m, v) {
  return [
    (m[0] * v[0]) + (m[1] * v[1]) + (m[2] * v[2]),
    (m[3] * v[0]) + (m[4] * v[1]) + (m[5] * v[2]),
    (m[6] * v[0]) + (m[7] * v[1]) + (m[8] * v[2])
  ];
}

function readMat3x3(mat) {
  const srcData = mat.data64F || mat.data32F;
  if (!srcData || srcData.length < 9) {
    return null;
  }
  const out = new Array(9);
  for (let i = 0; i < 9; i++) {
    out[i] = srcData[i];
  }
  return out;
}

function readMat3x1(mat) {
  const srcData = mat.data64F || mat.data32F;
  if (!srcData || srcData.length < 3) {
    return null;
  }
  return [srcData[0], srcData[1], srcData[2]];
}

function isFiniteVec(arr) {
  if (!arr || !arr.length) return false;
  for (let i = 0; i < arr.length; i++) {
    if (!Number.isFinite(arr[i])) return false;
  }
  return true;
}

function matData(mat) {
  return mat.data64F || mat.data32F || mat.data || mat.data8U || [];
}

function frobeniusNorm(data) {
  let sumSq = 0;
  for (let i = 0; i < data.length; i++) {
    const v = data[i];
    if (!Number.isFinite(v)) return NaN;
    sumSq += v * v;
  }
  return Math.sqrt(sumSq);
}

function det3(m) {
  return (m[0] * ((m[4] * m[8]) - (m[5] * m[7])))
    - (m[1] * ((m[3] * m[8]) - (m[5] * m[6])))
    + (m[2] * ((m[3] * m[7]) - (m[4] * m[6])));
}

function requestFeatureReseed(reason) {
  if (!reseedRequested) {
    if (reason === "pose_stall") {
      console.warn("POSE STALL DETECTED");
    } else {
      console.warn(`FEATURE RESEED (${reason})`);
    }
  }
  reseedRequested = true;
}

function reseedFeatures(grayMat, reason = "reset") {
  resetTrackingState();
  trackedPoints = detectFeatures(grayMat, MAX_POINTS);
  smoothedDrawPoints = trackedPoints.map((p) => ({ x: p.x, y: p.y }));
  if (prevGray) {
    prevGray.delete();
    prevGray = null;
  }
  prevGray = grayMat.clone();
  reseedRequested = false;
  statusText.textContent = `Tracking points (${reason})...`;
}

function drawArrow(x0, y0, x1, y1, color) {
  const angle = Math.atan2(y1 - y0, x1 - x0);
  const head = 10;
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x1, y1);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x1 - (head * Math.cos(angle - Math.PI / 6)), y1 - (head * Math.sin(angle - Math.PI / 6)));
  ctx.lineTo(x1 - (head * Math.cos(angle + Math.PI / 6)), y1 - (head * Math.sin(angle + Math.PI / 6)));
  ctx.closePath();
  ctx.fill();
}

function updateDebugOverlay() {
  const tx = latestRelativeT[0];
  const ty = latestRelativeT[1];
  const tz = latestRelativeT[2];
  const motion = Math.hypot(tx, ty, tz);

  voDebug.textContent =
`Tracked Points: ${trackedPoints.length}
Inliers: ${essentialInlierCount}
E-norm: ${Number.isFinite(lastENorm) ? lastENorm.toFixed(4) : "nan"}
det(R): ${Number.isFinite(lastRDet) ? lastRDet.toFixed(4) : "nan"}
t: [${tx.toFixed(2)}, ${ty.toFixed(2)}, ${tz.toFixed(2)}]
globalT: [${globalT[0].toFixed(2)}, ${globalT[1].toFixed(2)}, ${globalT[2].toFixed(2)}]
Delta t: ${lastDeltaMotion.toFixed(4)}
Motion: ${motionActivity}
R:
${latestRelativeR[0].toFixed(2)} ${latestRelativeR[1].toFixed(2)} ${latestRelativeR[2].toFixed(2)}
${latestRelativeR[3].toFixed(2)} ${latestRelativeR[4].toFixed(2)} ${latestRelativeR[5].toFixed(2)}
${latestRelativeR[6].toFixed(2)} ${latestRelativeR[7].toFixed(2)} ${latestRelativeR[8].toFixed(2)}
|t|: ${motion.toFixed(2)}`;
}

function estimatePoseFromTracks(prevPoints, currPoints) {
  essentialInlierCount = 0;
  inlierDrawPoints = [];
  inlierDrawMask = [];
  lastENorm = 0;
  lastRDet = 1;

  if (prevPoints.length < MIN_POSE_POINTS || currPoints.length !== prevPoints.length) {
    latestRelativeT = [0, 0, 0];
    motionActivity = "INSUFFICIENT_POINTS";
    return;
  }

  // Enforce ordering: currPts -> prevPts in both calls.
  const prevPtsMat = pointsToMat(prevPoints);
  const currPtsMat = pointsToMat(currPoints);
  const inlierMask = new cv.Mat();
  const poseMask = new cv.Mat();
  let inlierPrevMat = null;
  let inlierCurrMat = null;
  let essential = null;
  let R = null;
  let t = null;

  try {
    const focalLength = Math.max(canvas.width, 1);
    const principalPoint = new cv.Point(canvas.width * 0.5, canvas.height * 0.5);

    essential = cv.findEssentialMat(
      currPtsMat,
      prevPtsMat,
      focalLength,
      principalPoint,
      cv.RANSAC,
      0.999,
      ESSENTIAL_RANSAC_THRESH,
      inlierMask
    );

    // Validation gate before recoverPose.
    if (!essential || essential.empty() || essential.rows < 3 || essential.cols < 3) {
      latestRelativeT = [0, 0, 0];
      motionActivity = "SKIP_NO_E";
      return;
    }
    const eData = matData(essential);
    if (!eData.length || !Number.isFinite(eData[0])) {
      latestRelativeT = [0, 0, 0];
      motionActivity = "SKIP_BAD_E";
      return;
    }
    lastENorm = frobeniusNorm(eData);

    const firstMaskData = matData(inlierMask);
    const firstMaskLen = Math.min(firstMaskData.length, currPoints.length);
    const inlierPrevPts = [];
    const inlierCurrPts = [];
    const inlierIndices = [];
    for (let i = 0; i < currPoints.length; i++) {
      const rawMaskValue = i < firstMaskLen ? firstMaskData[i] : 0;
      const normalizedMaskValue = (rawMaskValue === 1 || rawMaskValue === 255) ? 1 : 0;
      if (normalizedMaskValue === 1) {
        inlierPrevPts.push(prevPoints[i]);
        inlierCurrPts.push(currPoints[i]);
        inlierIndices.push(i);
      }
    }

    if (inlierCurrPts.length < MIN_POSE_INLIERS) {
      latestRelativeT = [0, 0, 0];
      motionActivity = "SKIP_LOW_INLIERS";
      return;
    }

    inlierPrevMat = pointsToMat(inlierPrevPts);
    inlierCurrMat = pointsToMat(inlierCurrPts);
    R = new cv.Mat();
    t = new cv.Mat();

    cv.recoverPose(
      essential,
      inlierCurrMat,
      inlierPrevMat,
      R,
      t,
      focalLength,
      principalPoint,
      poseMask
    );

    const poseMaskData = matData(poseMask);
    const poseMaskLen = Math.min(poseMaskData.length, inlierCurrPts.length);
    const finalInlierFlags = new Array(currPoints.length).fill(false);
    essentialInlierCount = 0;
    for (let j = 0; j < inlierCurrPts.length; j++) {
      const rawMaskValue = j < poseMaskLen ? poseMaskData[j] : 0;
      const normalizedMaskValue = (rawMaskValue === 1 || rawMaskValue === 255) ? 1 : 0;
      if (normalizedMaskValue === 1) {
        finalInlierFlags[inlierIndices[j]] = true;
        essentialInlierCount++;
      }
    }

    for (let i = 0; i < currPoints.length; i++) {
      inlierDrawPoints.push(currPoints[i]);
      inlierDrawMask.push(finalInlierFlags[i]);
    }

    if (essentialInlierCount < MIN_POSE_INLIERS) {
      latestRelativeT = [0, 0, 0];
      motionActivity = "SKIP_POSE_INLIERS";
      return;
    }

    const relativeR = readMat3x3(R);
    const relativeT = readMat3x1(t);
    if (!relativeR || !relativeT || !isFiniteVec(relativeR) || !isFiniteVec(relativeT)) {
      latestRelativeT = [0, 0, 0];
      motionActivity = "SKIP_BAD_RT";
      return;
    }
    lastRDet = det3(relativeR);

    latestRelativeR = relativeR;
    latestRelativeT = relativeT;

    const deltaMotion = Math.hypot(
      relativeT[0] - lastRelativeT[0],
      relativeT[1] - lastRelativeT[1],
      relativeT[2] - lastRelativeT[2]
    );
    lastDeltaMotion = deltaMotion;
    if (deltaMotion < STALL_DELTA_EPS) {
      staticMotionFrames++;
      motionActivity = "LOW_MOTION";
      if (staticMotionFrames >= STALL_FRAME_LIMIT) {
        motionActivity = "POSE_STALL";
        requestFeatureReseed("pose_stall");
      }
    } else {
      staticMotionFrames = 0;
      motionActivity = "ACTIVE";
    }

    const worldStep = multiplyMatVec3(globalR, relativeT);
    if (!isFiniteVec(worldStep)) {
      latestRelativeT = [0, 0, 0];
      motionActivity = "SKIP_BAD_STEP";
      return;
    }
    globalT[0] += worldStep[0];
    globalT[1] += worldStep[1];
    globalT[2] += worldStep[2];
    globalR = multiplyMat3(relativeR, globalR);
    lastRelativeT = [relativeT[0], relativeT[1], relativeT[2]];

    if (trajectory.length === 0) {
      trajectory.push([globalT[0], globalT[1], globalT[2]]);
    } else {
      const prevTraj = trajectory[trajectory.length - 1];
      const stepNorm = Math.hypot(globalT[0] - prevTraj[0], globalT[1] - prevTraj[1], globalT[2] - prevTraj[2]);
      if (stepNorm > 1e-4) {
        trajectory.push([globalT[0], globalT[1], globalT[2]]);
      }
    }
    if (trajectory.length > 1200) {
      trajectory.shift();
    }
  } catch (err) {
    latestRelativeT = [0, 0, 0];
    essentialInlierCount = 0;
    inlierDrawPoints = [];
    inlierDrawMask = [];
    motionActivity = "ERROR";
  } finally {
    prevPtsMat.delete();
    currPtsMat.delete();
    inlierMask.delete();
    poseMask.delete();
    if (essential) essential.delete();
    if (inlierPrevMat) inlierPrevMat.delete();
    if (inlierCurrMat) inlierCurrMat.delete();
    if (R) R.delete();
    if (t) t.delete();
  }
}

function drawTrajectoryTopDown() {
  if (trajectory.length < 2) return;

  const pad = 10;
  const panelSize = 140;
  const panelX = canvas.width - panelSize - pad;
  const panelY = pad;
  const innerPad = 10;
  const minDraw = panelX + innerPad;
  const maxDraw = panelX + panelSize - innerPad;

  let minX = trajectory[0][0];
  let maxX = trajectory[0][0];
  let minZ = trajectory[0][2];
  let maxZ = trajectory[0][2];
  for (let i = 1; i < trajectory.length; i++) {
    const p = trajectory[i];
    if (p[0] < minX) minX = p[0];
    if (p[0] > maxX) maxX = p[0];
    if (p[2] < minZ) minZ = p[2];
    if (p[2] > maxZ) maxZ = p[2];
  }
  const spanX = Math.max(maxX - minX, 1e-3);
  const spanZ = Math.max(maxZ - minZ, 1e-3);
  const scale = Math.min((maxDraw - minDraw) / spanX, (maxDraw - minDraw) / spanZ);

  ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
  ctx.fillRect(panelX, panelY, panelSize, panelSize);
  ctx.strokeStyle = "rgba(130, 130, 130, 0.75)";
  ctx.lineWidth = 1;
  ctx.strokeRect(panelX, panelY, panelSize, panelSize);

  ctx.strokeStyle = "#ffd166";
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < trajectory.length; i++) {
    const p = trajectory[i];
    const x = minDraw + ((p[0] - minX) * scale);
    const y = maxDraw - ((p[2] - minZ) * scale);
    if (i === 0) {
      ctx.moveTo(x, y);
    } else {
      ctx.lineTo(x, y);
    }
  }
  ctx.stroke();

  const last = trajectory[trajectory.length - 1];
  const cx = minDraw + ((last[0] - minX) * scale);
  const cy = maxDraw - ((last[2] - minZ) * scale);
  ctx.fillStyle = "#36c4ff";
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, 2 * Math.PI);
  ctx.fill();
}

function drawPoseDebugVisuals() {
  if (inlierDrawPoints.length > 0) {
    for (let i = 0; i < inlierDrawPoints.length; i++) {
      const p = inlierDrawPoints[i];
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
      ctx.fillStyle = inlierDrawMask[i] ? "#00ff66" : "#ff3b30";
      ctx.fill();
    }
  }

  const centerX = canvas.width * 0.5;
  const centerY = canvas.height * 0.5;
  const dirX = latestRelativeT[0];
  const dirY = latestRelativeT[1];
  const norm = Math.hypot(dirX, dirY);
  if (norm > 1e-5) {
    const maxLen = Math.min(canvas.width, canvas.height) * 0.22;
    const arrowLen = Math.min(maxLen, ARROW_SCALE * norm);
    const endX = centerX + ((dirX / norm) * arrowLen);
    const endY = centerY + ((dirY / norm) * arrowLen);
    drawArrow(centerX, centerY, endX, endY, "#36c4ff");
  }

  drawTrajectoryTopDown();
}

/* ---------------- FRAME LOOP ---------------- */
function processFrame() {
  if (!streaming) return;

  ensureFrameBufferSize();
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  src.data.set(imageData.data);

  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

  if (reseedRequested || !prevGray || trackedPoints.length < MIN_POINTS) {
    reseedFeatures(gray, reseedRequested ? "reseed" : "bootstrap");
  } else {
    const prevPtsMat = pointsToMat(trackedPoints);
    const nextPtsMat = new cv.Mat();
    const status = new cv.Mat();
    const err = new cv.Mat();

    cv.calcOpticalFlowPyrLK(
      prevGray,
      gray,
      prevPtsMat,
      nextPtsMat,
      status,
      err,
      lkWinSize,
      2,
      lkCriteria
    );

    const candidates = [];
    const statusLen = Math.min(status.rows * status.cols, trackedPoints.length);
    const nextData = nextPtsMat.data32F || [];

    for (let i = 0; i < statusLen; i++) {
      if (status.data[i] !== 1) {
        continue;
      }
      const nx = nextData[i * 2];
      const ny = nextData[(i * 2) + 1];
      const lkErr = err.data32F ? err.data32F[i] : 0;

      if (
        !Number.isFinite(nx) ||
        !Number.isFinite(ny) ||
        nx < 0 ||
        ny < 0 ||
        nx >= canvas.width ||
        ny >= canvas.height ||
        (Number.isFinite(lkErr) && lkErr > LK_ERR_MAX)
      ) {
        continue;
      }

      candidates.push({
        raw: { x: nx, y: ny },
        prev: trackedPoints[i],
        prevDraw: smoothedDrawPoints[i]
      });
    }

    const robustCandidates = [];
    if (candidates.length > 0) {
      const candidateMat = pointsToMat(candidates.map((c) => c.raw));
      const backPtsMat = new cv.Mat();
      const backStatus = new cv.Mat();
      const backErr = new cv.Mat();

      cv.calcOpticalFlowPyrLK(
        gray,
        prevGray,
        candidateMat,
        backPtsMat,
        backStatus,
        backErr,
        lkWinSize,
        2,
        lkCriteria
      );

      const backData = backPtsMat.data32F || [];
      for (let i = 0; i < candidates.length; i++) {
        if (backStatus.data[i] !== 1) {
          continue;
        }

        const bx = backData[i * 2];
        const by = backData[(i * 2) + 1];
        const reverseLkErr = backErr.data32F ? backErr.data32F[i] : 0;
        if (
          !Number.isFinite(bx) ||
          !Number.isFinite(by) ||
          (Number.isFinite(reverseLkErr) && reverseLkErr > LK_ERR_MAX)
        ) {
          continue;
        }

        const backtrackErr = Math.hypot(
          bx - candidates[i].prev.x,
          by - candidates[i].prev.y
        );
        if (backtrackErr > FB_ERR_MAX) {
          continue;
        }

        robustCandidates.push(candidates[i]);
      }

      candidateMat.delete();
      backPtsMat.delete();
      backStatus.delete();
      backErr.delete();
    }

    const nextPts = [];
    const nextDraw = [];
    const voPrevPoints = [];
    const voCurrPoints = [];
    if (robustCandidates.length > 0) {
      const flowDists = [];
      for (let i = 0; i < robustCandidates.length; i++) {
        const c = robustCandidates[i];
        flowDists.push(Math.hypot(c.raw.x - c.prev.x, c.raw.y - c.prev.y));
      }
      const medFlow = median(flowDists);
      const madLike = median(flowDists.map((d) => Math.abs(d - medFlow)));
      const flowThreshold = Math.max(
        FLOW_OUTLIER_BASE,
        medFlow + (FLOW_OUTLIER_SCALE * (madLike + 0.15))
      );

      for (let i = 0; i < robustCandidates.length; i++) {
        const c = robustCandidates[i];
        const flow = Math.hypot(c.raw.x - c.prev.x, c.raw.y - c.prev.y);
        if (flow > flowThreshold) {
          continue;
        }
        nextPts.push(c.raw);
        nextDraw.push(smoothPoint(c.raw, c.prevDraw));
        voPrevPoints.push(c.prev);
        voCurrPoints.push(c.raw);
      }
    }

    estimatePoseFromTracks(voPrevPoints, voCurrPoints);

    if (reseedRequested || nextPts.length < MIN_POINTS) {
      requestFeatureReseed(nextPts.length < MIN_POINTS ? "tracking_degenerate" : "pose_stall");
      reseedFeatures(gray, "tracking_reset");
    } else {
      trackedPoints = nextPts;
      smoothedDrawPoints = nextDraw;
    }

    prevPtsMat.delete();
    nextPtsMat.delete();
    status.delete();
    err.delete();

  }

  for (let i = 0; i < smoothedDrawPoints.length; i++) {
    const p = smoothedDrawPoints[i];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, 2 * Math.PI);
    ctx.fillStyle = "rgba(170, 255, 170, 0.25)";
    ctx.fill();
  }

  drawPoseDebugVisuals();
  updateDebugOverlay();

  if (prevGray) {
    prevGray.delete();
  }
  prevGray = gray.clone();

  requestAnimationFrame(processFrame);
}

/* ---------------- INIT ---------------- */
async function init() {
  statusText.textContent = "Starting camera...";
  await startCamera();
  statusText.textContent = "Loading OpenCV...";
  await waitForCV();

  updateCanvasSize();

  src = new cv.Mat(canvas.height, canvas.width, cv.CV_8UC4);
  gray = new cv.Mat();
  lkWinSize = new cv.Size(21, 21);
  lkCriteria = new cv.TermCriteria(
    cv.TermCriteria_EPS + cv.TermCriteria_COUNT,
    30,
    0.01
  );

  streaming = true;
  statusText.textContent = "Tracking points...";
  requestAnimationFrame(processFrame);
}

window.addEventListener("resize", updateCanvasSize);
window.addEventListener("orientationchange", () => {
  setTimeout(updateCanvasSize, 120);
});

startButton.addEventListener("click", async () => {
  startButton.disabled = true;
  startButton.textContent = "Starting...";
  try {
    await init();
    startOverlay.style.display = "none";
  } catch (err) {
    const message = err && err.message ? err.message : "Failed to start AR camera.";
    statusText.textContent = message;
    startButton.disabled = false;
    startButton.textContent = "Retry Start";
  }
});
</script>
