<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>8th Wall AR Cube (Clean)</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      height: 100%;
      width: 100%;
      font-family: Arial, sans-serif;
    }

    #camerafeed {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }

    #startBtn {
      margin-top: 10px;
      padding: 10px 14px;
      background: white;
      color: black;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <canvas id="camerafeed"></canvas>

  <div id="ui">
    <div>Status: <span id="status">Idle</span></div>
    <div>Tracking: <span id="tracking">Off</span></div>
    <div>Object: <span id="object">None</span></div>

    <button id="startBtn">Start AR</button>
  </div>

  <!-- ✔ Correct: local XR binary bundle (NOT CDN) -->
  <script id="xr8Script" src="./external/xr/xr.js" data-preload-chunks="slam"></script>

  <script>
    const canvas = document.getElementById("camerafeed");
    const statusEl = document.getElementById("status");
    const trackingEl = document.getElementById("tracking");
    const objectEl = document.getElementById("object");
    const startBtn = document.getElementById("startBtn");
    const xr8ScriptEl = document.getElementById("xr8Script");

    let cube = null;
    let scene = null;
    let camera = null;
    let started = false;

    function setStatus(s) {
      statusEl.textContent = s;
    }

    function setTracking(s) {
      trackingEl.textContent = s;
    }

    function setObject(s) {
      objectEl.textContent = s;
    }

    async function waitForXR8(timeoutMs = 12000) {
      if (window.XR8) {
        return;
      }

      if (window.XR8Promise && typeof window.XR8Promise.then === "function") {
        await window.XR8Promise;
        return;
      }

      await new Promise((resolve, reject) => {
        const timeoutId = setTimeout(() => {
          cleanup();
          reject(new Error("Timed out waiting for XR8 runtime."));
        }, timeoutMs);

        const onLoaded = () => {
          cleanup();
          resolve();
        };

        const onScriptError = () => {
          cleanup();
          reject(new Error("Failed to load xr.js (check ./external/xr/xr.js path)."));
        };

        const cleanup = () => {
          clearTimeout(timeoutId);
          window.removeEventListener("xrloaded", onLoaded);
          if (xr8ScriptEl) xr8ScriptEl.removeEventListener("error", onScriptError);
        };

        window.addEventListener("xrloaded", onLoaded, { once: true });
        if (xr8ScriptEl) xr8ScriptEl.addEventListener("error", onScriptError, { once: true });
      });

      if (!window.XR8) {
        throw new Error("XR8 runtime loaded event fired, but XR8 object is unavailable.");
      }
    }

    function createARModule() {
      return {
        name: "ar-module",

        onStart: () => {
          const xrScene = XR8.Threejs.xrScene();
          scene = xrScene.scene;
          camera = xrScene.camera;

          // Lighting
          const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
          scene.add(light);

          // Cube (hidden initially)
          cube = new THREE.Mesh(
            new THREE.BoxGeometry(0.25, 0.25, 0.25),
            new THREE.MeshStandardMaterial({ color: 0x00aaff })
          );

          cube.visible = false;
          scene.add(cube);

          setStatus("AR Ready");
          setTracking("Scanning...");
        },

        onUpdate: ({ processCpuResult }) => {
          const status = processCpuResult?.reality?.worldTracking?.status;
          if (status) setTracking(status);
        },

        onRender: () => {
          const { renderer, scene, camera } = XR8.Threejs.xrScene();
          renderer.render(scene, camera);
        }
      };
    }

    function placeCubeInFrontOfCamera() {
      if (!cube || !camera) return;

      // ✔ Stable SLAM-safe placement
      const distance = 1.2;

      const forward = new THREE.Vector3(0, 0, -1)
        .applyQuaternion(camera.quaternion)
        .normalize()
        .multiplyScalar(distance);

      cube.position.copy(camera.position).add(forward);
      cube.quaternion.copy(camera.quaternion);

      cube.visible = true;

      setObject("Cube placed");
    }

    async function startAR() {
      if (started) return;
      started = true;
      startBtn.disabled = true;
      startBtn.textContent = "Starting...";

      setStatus("Starting XR...");
      try {
        await waitForXR8();

        XR8.XrController.configure({
          disableWorldTracking: false
        });

        XR8.addCameraPipelineModules([
          XR8.GlTextureRenderer.pipelineModule(),
          XR8.Threejs.pipelineModule(),
          XR8.XrController.pipelineModule(),
          createARModule()
        ]);

        await XR8.run({ canvas });

        setStatus("Running");
        setTracking("Active");
        startBtn.textContent = "AR Running";

        // Tap to place object.
        canvas.addEventListener("click", placeCubeInFrontOfCamera);
      } catch (error) {
        started = false;
        startBtn.disabled = false;
        startBtn.textContent = "Start AR";
        setStatus(`Failed: ${error.message || String(error)}`);
        setTracking("Off");
        setObject("None");
      }
    }

    startBtn.addEventListener("click", startAR);
  </script>
</body>
</html>
